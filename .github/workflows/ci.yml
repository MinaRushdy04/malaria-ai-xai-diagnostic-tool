name: ci

on:
  push:
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python files
        run: python -m py_compile $(git ls-files "*.py")

      - name: Run tests
        run: python -m pytest tests -q

      - name: Smoke-check CLI entry points
        run: |
          python scripts/calibration_analysis.py --help
          python scripts/confidence_intervals.py --help
          python scripts/robustness_analysis.py --help
          python scripts/error_analysis.py --help
          python scripts/predict_image.py --help
          python scripts/train_model.py --help

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t malaria-ai-xai .
