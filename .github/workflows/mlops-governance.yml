name: mlops-governance

on:
  push:
  pull_request:

jobs:
  governance-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate model registry
        run: python scripts/register_model.py --check

      - name: Export API contracts
        run: python scripts/export_api_contracts.py

      - name: Ensure contracts are committed
        run: git diff --exit-code contracts registry

      - name: Validate Kubernetes manifests
        run: python scripts/validate_kubernetes.py

      - name: Smoke-check operational CLIs
        run: |
          python scripts/drift_monitor.py --help
          python scripts/retraining_pipeline.py --help
          python scripts/load_test.py --help
