apiVersion: apps/v1
kind: Deployment
metadata:
  name: malaria-ai-api
  namespace: malaria-ai
  labels:
    app.kubernetes.io/name: malaria-ai
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: malaria-ai
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: malaria-ai
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: ghcr.io/minarushdy04/malaria-ai-xai-diagnostic-tool:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: malaria-ai-config
            - secretRef:
                name: malaria-ai-secret
                optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: logs
          emptyDir: {}
